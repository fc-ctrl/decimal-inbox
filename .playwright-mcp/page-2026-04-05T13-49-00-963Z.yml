            - generic [ref=e653]: "Bonjour, Je prends note de votre retour suite à votre intervention. Toutefois, la présence d’une fuite dans un ouvrage réceptionné en août 2024 engage votre responsabilité au titre des garanties légales, notamment la garantie de parfait achèvement. À ce stade, aucune origine précise de la fuite n’ayant été formellement identifiée, il ne peut m’être demandé de prendre à ma charge des travaux exploratoires, en particulier en l’absence de preuve que l’intervention d’un tiers serait à l’origine du désordre constaté. Je vous remercie donc de bien vouloir organiser les investigations nécessaires afin de localiser précisément la fuite et d’en déterminer l’origine. À défaut, je me verrai contraint de missionner un expert afin de constater le désordre et d’engager les démarches nécessaires. Dans l’attente de votre retour. Le 05.04.2026 12:18, Fabrice a écrit : > Bonjour, > > Suite à votre message, notre entretien téléphonique de ce matin et à > notre intervention du mardi 17 mars, nous souhaitons vous apporter les > précisions suivantes. > Lors de notre passage, nous avons réalisé l’ensemble des contrôles > nécessaires sur les éléments accessibles de votre installation : > skimmers, refoulements, brides et réseau hydraulique. > À ce jour, aucune fuite n’a été constatée sur ces postes, que ce soit > en étanchéité ou en hydraulique. > Comme évoqué ensemble lors de notre intervention puis confirmé lors de > notre échange téléphonique de ce matin, le point restant à vérifier > concerne les traversées de paroi au niveau des spots. > Or, cet accès a été condamné suite à l’intervention d’un tiers, ce qui > ne nous permet pas de réaliser les contrôles nécessaires. > Dans ces conditions, et comme convenu, il vous appartient de faire > intervenir le carreleur afin de déposer les éléments concernés et > rétablir l’accès, cette intervention étant à votre charge puisque la > zone a été rendue inaccessible après notre passage. > Concernant votre question sur la dépose et repose des carreaux, > celle-ci s’inscrit dans ce même cadre. > À ce stade, et au regard des tests effectués, aucune fuite n’a pu être > mise en évidence. > Nous restons bien entendu à votre disposition pour intervenir à nouveau > dès que l’accès sera rétabli, afin de finaliser les vérifications."
          - generic [ref=e654]:
