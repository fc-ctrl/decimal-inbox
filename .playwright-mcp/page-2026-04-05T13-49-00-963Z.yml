              - generic [ref=e657]: 05 avr. 2026 14:18
            - paragraph [ref=e658]: "Bonjour, Suite à votre message, notre entretien téléphonique de ce matin et à notre intervention du mardi 17 mars, nous souhaitons vous apporter les précisions suivantes. Lors de notre passage, nous avons réalisé l’ensemble des contrôles nécessaires sur les éléments accessibles de votre installation : skimmers, refoulements, brides et réseau hydraulique. À ce jour, aucune fuite n’a été constatée sur ces postes, que ce soit en étanchéité ou en hydraulique. Comme évoqué ensemble lors de notre intervention puis confirmé lors de notre échange téléphonique de ce matin, le point restant à vérifier concerne les traversées de paroi au niveau des spots. Or, cet accès a été condamné suite à l’intervention d’un tiers, ce qui ne nous permet pas de réaliser les contrôles nécessaires. Dans ces conditions, et comme convenu, il vous appartient de faire intervenir le carreleur afin de déposer les éléments concernés et rétablir l’accès, cette intervention étant à votre charge puisque la zone a été rendue inaccessible après notre passage. Concernant votre question sur la dépose et repose des carreaux, celle-ci s’inscrit dans ce même cadre. À ce stade, et au regard des tests effectués, aucune fuite n’a pu être mise en évidence. Nous restons bien entendu à votre disposition pour intervenir à nouveau dès que l’accès sera rétabli, afin de finaliser les vérifications."
